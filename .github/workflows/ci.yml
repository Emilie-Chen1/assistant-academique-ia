name: Python CI Main

# Déclenche le pipeline à chaque push ou pull request sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Installation des bibliothèques listées dans ton requirements.txt
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        pip install flake8
        # Vérification des erreurs de syntaxe (le build échoue si le code est cassé)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests with pytest
      run: |
        pip install pytest
        pytest test_app.py -v
        
    - name: Test Streamlit launch
      run: |
        # Vérifie que streamlit peut au moins charger l'app sans erreur immédiate
        python -m streamlit help